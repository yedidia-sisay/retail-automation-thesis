[options]
; ─────────────────────────────────────────────────────────────────────────────
; Odoo 17 Configuration — Retail Checkout Automation Demo
; ─────────────────────────────────────────────────────────────────────────────

; Database
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo_secret_2024
; db_name is intentionally not set here — the database is created via
; the web manager (/web/database/manager) or setup_odoo.py on first run.

; Master password (protects /web/database/manager)
admin_passwd = retail_master_2024

; Addons
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; Logging
log_level = info
logfile = False

; Workers (0 = single-threaded, fine for demo)
workers = 0

; Limits
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

; HTTP
http_interface = 0.0.0.0
http_port = 8069
proxy_mode = False

; Demo data — set to True to load Odoo's built-in demo records
without_demo = all
